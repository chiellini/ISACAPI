# Example Nginx reverse proxy for ISACAPI on isacai.space.
# Put this file inside the nginx http context, for example under conf.d/.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name isacai.space www.isacai.space;

    # API clients may send POST requests to HTTP by mistake; 308 preserves method and body.
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name isacai.space www.isacai.space;

    # ISACAPI/Codex traffic may include headers such as session_id.
    underscores_in_headers on;

    ssl_certificate /etc/letsencrypt/live/isacai.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/isacai.space/privkey.pem;

    client_max_body_size 256m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
